name = "guard-mesh"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[vars]
GUARD_VERSION = "0.1.0"
ENVIRONMENT = "production"

[[r2_buckets]]
binding = "COGLET_STORE"
bucket_name = "guard-coglets"

[[durable_objects.bindings]]
name = "GUARD_REGISTRY"
class_name = "GuardRegistry"

[[durable_objects.bindings]]
name = "THREAT_INTEL"
class_name = "ThreatIntel"

[[migrations]]
tag = "v1"
new_classes = ["GuardRegistry", "ThreatIntel"]

[env.staging]
name = "guard-mesh-staging"
[env.staging.vars]
ENVIRONMENT = "staging"

[env.dev]
name = "guard-mesh-dev"
[env.dev.vars]
ENVIRONMENT = "development"
