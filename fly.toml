# fly.toml app configuration file generated for lang-floral-firefly-7929 on 2025-08-20T14:31:14-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'lang-floral-firefly-7929'
primary_region = 'sjc'
kill_signal = 'SIGTERM'

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "/app/bin/lang eval Lang.Release.migrate"

[env]
  MIX_ENV = 'prod'
  PHX_HOST = 'lang-floral-firefly-7929.fly.dev'
  PHX_SERVER = 'true'
  #PHX_HOST = "lang.nocsi.com"
  PORT = "4000"
  ECTO_IPV6 = "true"
  ERL_AFLAGS = "-proto_dist inet6_tcp"
  # R2 for NIFs
  R2_BUCKET = "lang-nifs"
  R2_ENDPOINT = "https://YOUR_ACCOUNT.r2.cloudflarestorage.com"

[[mounts]]
  source = 'lang_uploads'
  destination = '/home/app/uploads'

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = true  # Save money!
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 1000
    soft_limit = 1000

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[services]]
  protocol = "tcp"
  internal_port = 4000

[[services.ports]]
  port = 80
  handlers = ["http"]

[[services.ports]]
  port = 443
  handlers = ["tls", "http"]

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

[[metrics]]
  port = 9091
  path = '/metrics'
