global
    log stdout format raw local0

defaults
    log global
    mode http
    option httplog
    timeout connect 5s
    timeout client  30s
    timeout server  30s

frontend http-in
    bind *:8080
    acl is_websocket hdr(Upgrade) -i WebSocket
    acl is_websocket hdr_beg(Upgrade) -i websocket
    use_backend app_ws if is_websocket
    default_backend app

backend app_ws
    option http-server-close
    option forwardfor
    server app host.docker.internal:4000 check

backend app
    option http-server-close
    option forwardfor
    server app host.docker.internal:4000 check
