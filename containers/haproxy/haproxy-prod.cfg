global
    log stdout format raw local0
    tune.ssl.default-dh-param 2048

defaults
    log global
    mode http
    option httplog
    timeout connect 5s
    timeout client  60s
    timeout server  60s

# Lua script should expose a function jwt_verify that validates RS256 against JWK/JWKS
# and sets txn vars like txn.jwt_org and returns allow/deny
lua-load /usr/local/etc/haproxy/jwt.lua

frontend https
    bind *:8080
    acl is_ws hdr(Upgrade) -i websocket
    http-request set-var(txn.jwt_status) lua.jwt_verify if is_ws
    acl jwt_bad var(txn.jwt_status) -m str deny
    http-request deny status 401 if jwt_bad

    # Stick-table by org claim for rate limiting
    stick-table type string size 100k expire 5m store http_req_rate(10s)
    http-request track-sc0 var(txn.jwt_org) if is_ws
    acl rl_abuse sc_http_req_rate(0) gt 50
    http-request deny status 429 if rl_abuse

    use_backend app_ws if is_ws
    default_backend app

backend app_ws
    option http-server-close
    option forwardfor
    server app host.docker.internal:4000 check

backend app
    option http-server-close
    option forwardfor
    server app host.docker.internal:4000 check

